<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DrinkMate | The Ultimate Cocktail Finder</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body class="fade-in">

    <nav class="navbar">
        <div class="logo" id="logo-home">Drink<span>Mate</span></div>
        <div class="nav-links">
            <button id="theme-btn" class="theme-toggle">☀️ Light Mode</button>
        </div>
    </nav>

    <header id="landing-section" class="hero">
        <div class="hero-content">
            <h1>DrinkMate</h1>
            <p>Find your perfect drink recipe</p>
            
            <div class="category-cards">
                <div class="cat-card" id="btn-alcoholic">
                    <div class="cat-img-wrapper">
                        <img src="alcoholic-cat.jpg" alt="Alcoholic Drinks">
                    </div>
                    <div class="cat-info">
                        <div class="cat-icon"></div>
                        <h3>Alcoholic Drinks</h3>
                        <p>Classic & modern cocktails</p>
                    </div>
                </div>
                <div class="cat-card" id="btn-non-alcoholic">
                    <div class="cat-img-wrapper">
                        <img src="non-alcoholic-cat.jpg" alt="Non-Alcoholic Drinks">
                    </div>
                    <div class="cat-info">
                        <div class="cat-icon"></div>
                        <h3>Non-Alcoholic</h3>
                        <p>Refreshing mocktails & juices</p>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main id="main-content" class="main-content hidden">
        <div class="controls-wrapper">
            <button id="back-home" class="back-btn">← Back to Home</button>
            <div class="search-container">
                <input type="text" id="search-box" placeholder="Search cocktails...">
                <div class="button-group">
                    <button id="sort-btn" class="secondary-btn">A-Z Sort</button>
                    <button id="fav-view-btn" class="accent-btn">My Favorites</button>
                </div>
            </div>
            <h2 id="section-title">Alcoholic Drinks</h2>
        </div>

        <div id="status-msg" class="loader-text">Loading drinks...</div>
        <div id="drinks-grid" class="cards-grid"></div>
    </main>

    <div id="drink-modal" class="modal-backdrop">
        <div class="modal-box">
            <button class="close-modal">&times;</button>
            <div id="modal-content"></div>
        </div>
    </div>

    <footer class="site-footer">
        <p>DrinkMate &copy; 2026</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
